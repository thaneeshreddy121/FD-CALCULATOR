<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<style>

#bor{

  border:2px solid black;
  padding:20px;
 background-color:antiquewhite;
 border-radius:0px;
  width:350px;
    border-radius:8px;;
  
}
 body{
 display:flex;
  justify-content:center;
  align-items:center;
 min-height:100vh;
 margin:0;
 background-color:green;
flex-direction:column;
} 
label{
  color:red;
  font-size: medium;
}
button{
  background-color:rosybrown;
}

</style>
</head>
<body>
  <h1>FD calculator</h1>
  
  
<div id="bor">
  <div>
  
  <label >Amount: <span id=ca>1000</span></label><br>
  <input type="range" id="amo" min="1000" max="1000000" value="1000"  oninput="ca.textContent=this.value"><br><br>
  
  <label >Rate: <span id="cr">1</span>%</label><br>
  <input type="range" min="1" step="0.1" max="18" id="rate" value="1" oninput="cr.textContent=this.value"><br><br>
  <label >Time: <span id="ct">1</span> years</label><br>
  <input type="range" id="time" min="1" max="65" value="1" oninput="ct.textContent=this.value"><br><br>


  <button onclick="invest()">Invest</button><br><br>

<h2 >invested amount:<br> <span id="ia">1000</span></h2>
<h2>interset amount:<br><span id="inta"></span></h2>
<h2>total: <br><span id=res></span></h2>

</div>
  
</div>


<script>
  function invest(){
var amount=Number(document.getElementById("amo").value);
var rat=Number(document.getElementById("rate").value);
var tim=Number(document.getElementById("time").value)
int=amount*Math.pow(1+((rat/100)/4),4*tim);
resl=int-amount;
total=resl+amount;

document.getElementById("ia").textContent=amount;
document.getElementById("inta").textContent=Math.round(resl);
document.getElementById("res").textContent=Math.round(total);
  }
</script>

</body>

</html>
